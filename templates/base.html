<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Humanizing Choice{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #eef3f9;
      --surface:   #ffffff;
      --surface2:  #f6f9fd;
      --border:    #d5deea;
      --accent:    #c4931f;
      --accent2:   #0a3a73;
      --accent-rgb: 196, 147, 31;
      --accent2-rgb: 10, 58, 115;
      --text:      #102a4a;
      --muted:     #5f6f86;
      --danger:    #9b2f2f;
      --radius:    10px;
      --font-head: 'Cormorant Garamond', serif;
      --font-body: 'Source Sans 3', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 48%, #eef2f8 100%);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 400;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Subtle institutional background texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 8% 0%, rgba(var(--accent2-rgb), 0.1), transparent 34%),
        radial-gradient(circle at 95% -8%, rgba(var(--accent-rgb), 0.14), transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top nav bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(248, 251, 255, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      font-family: var(--font-head);
      font-style: italic;
      font-weight: 700;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--accent2);
      text-decoration: none;
    }

    .topbar-logo::before {
      content: 'i';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      background: var(--accent);
      color: #ffffff;
      font-family: var(--font-head);
      font-style: normal;
      font-weight: 700;
      border-radius: 3px;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(var(--accent-rgb), 0.26);
    }

    .topbar-logo span {
      color: var(--accent2);
      font-weight: 600;
    }

    .topbar-badge {
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }

    /* ── Progress indicator ── */
    .progress-bar {
      height: 3px;
      background: #dbe3ee;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.4s ease;
    }

    /* ── Page wrapper ── */
    .page {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3.25rem 2rem 6rem;
    }

    /* ── Section label ── */
    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 1rem;
    }
    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 18px; height: 1px;
      background: var(--accent2);
    }

    /* ── Headings ── */
    h1, h2, h3 { font-family: var(--font-head); font-weight: 700; line-height: 1.15; }
    h1 { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700; }
    h2 { font-size: clamp(1.7rem, 3vw, 2.4rem); }
    h3 { font-size: 1.2rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      padding: 0.85rem 2rem;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--accent2);
      color: #ffffff;
    }
    .btn-primary:hover {
      background: #082f5f;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(var(--accent2-rgb), 0.25);
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--accent2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .btn-disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 8px 22px rgba(var(--accent2-rgb), 0.05);
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: rgba(var(--accent2-rgb), 0.28);
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(var(--accent2-rgb), 0.09);
    }

    /* ── Fade-in animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="{% url 'landing' %}" class="topbar-logo">Humanizing<span>Choice</span></a>
    <span class="topbar-badge">Pesquisa Acadêmica · IBMEC Rio</span>
  </nav>

  <div class="progress-bar">
    <div class="progress-bar-fill" style="width: {% block progress %}0{% endblock %}%"></div>
  </div>

  {% block content %}{% endblock %}

</body>
</html>
